name: Update Database (Incremental)

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update_db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: cd scripts && poetry install

      - name: Download existing database from R2
        id: download
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          # --remote is required: wrangler defaults `r2 object` to LOCAL storage,
          # which silently returns an empty file ("key does not exist").
          command: r2 object get server-radar/sb.duckdb -f static/sb.duckdb.wasm -J eu --remote
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Pin wrangler so a future version can't silently change command defaults.
          wranglerVersion: "4.101.0"
        continue-on-error: true # First run won't have existing DB

      - name: Verify downloaded database
        run: |
          # Fail fast (and preserve the good R2 object — uploads are gated on
          # success) if the download didn't produce a valid DuckDB file, instead
          # of crashing later with a confusing error or uploading garbage.
          if [ ! -s static/sb.duckdb.wasm ] || [ "$(stat -c%s static/sb.duckdb.wasm)" -lt 100000 ]; then
            echo "::error::R2 download produced a missing/too-small database file." \
                 "Check the CLOUDFLARE_API_TOKEN secret and that 'r2 object get' uses --remote."
            exit 1
          fi

      - name: Run incremental update
        id: update
        run: |
          cd scripts && poetry run python update_incremental.py ../static/sb.duckdb.wasm 90
          # Script exits with code 2 if validation fails - this will fail the step

      - name: Backup current DB before upload
        if: success()
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          # Keep a rolling backup - overwrites previous backup each time
          command: r2 object put server-radar/sb.duckdb.backup -f static/sb.duckdb.wasm -J eu --remote
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.101.0"
        continue-on-error: true # Don't fail if backup fails

      - name: Deploy DB to R2
        if: success()
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          command: r2 object put server-radar/sb.duckdb -f static/sb.duckdb.wasm -J eu --remote
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.101.0"

  notify_failure:
    runs-on: ubuntu-latest
    needs: update_db
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Send ntfy.sh notification
        run: |
          curl \
            -H "Title: Server Radar DB update failure" \
            -H "Priority: urgent" \
            -H "Tags: warning" \
            -d "The incremental DB update failed." \
            ntfy.sh/7vGYCNtEtfklA8Wx-wcrawl
