name: Update Database (Incremental)

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update_db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: cd scripts && poetry install

      - name: Download existing database from R2
        id: download
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          command: r2 object get server-radar/sb.duckdb -f static/sb.duckdb.wasm -J eu
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true # First run won't have existing DB

      - name: Run incremental update
        id: update
        run: |
          cd scripts && poetry run python update_incremental.py ../static/sb.duckdb.wasm 90
          # Script exits with code 2 if validation fails - this will fail the step

      - name: Backup current DB before upload
        if: success()
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          # Keep a rolling backup - overwrites previous backup each time
          command: r2 object put server-radar/sb.duckdb.backup -f static/sb.duckdb.wasm -J eu
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true # Don't fail if backup fails

      - name: Deploy DB to R2
        if: success()
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          command: r2 object put server-radar/sb.duckdb -f static/sb.duckdb.wasm -J eu
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  notify_failure:
    runs-on: ubuntu-latest
    needs: update_db
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Send ntfy.sh notification
        run: |
          curl \
            -H "Title: Server Radar DB update failure" \
            -H "Priority: urgent" \
            -H "Tags: warning" \
            -d "The incremental DB update failed." \
            ntfy.sh/7vGYCNtEtfklA8Wx-wcrawl
